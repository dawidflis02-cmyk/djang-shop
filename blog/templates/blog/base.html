<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Sklep{% endblock %}</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        font-family: "Georgia", "Times New Roman", serif;
        margin: 0;
        background: #f4f1ec;
        color: #241d17;
      }
      header {
        background: #2b211c;
        color: #f9f4ee;
        padding: 24px 16px;
      }
      header .wrap {
        max-width: 960px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      header a {
        color: #f9f4ee;
        text-decoration: none;
        font-weight: bold;
      }
      .container {
        max-width: 960px;
        margin: 24px auto 64px;
        padding: 0 16px;
      }
      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }
      .button {
        display: inline-block;
        padding: 8px 14px;
        border-radius: 6px;
        background: #b44a2a;
        color: #fff;
        text-decoration: none;
        border: none;
        cursor: pointer;
        font-size: 14px;
      }
      .button.secondary {
        background: #6f6056;
      }
      .card {
        background: #fff;
        border-radius: 10px;
        box-shadow: 0 8px 24px rgba(43, 33, 28, 0.08);
        padding: 16px;
        margin-bottom: 18px;
        display: grid;
        grid-template-columns: 120px 1fr;
        gap: 16px;
      }
      .card img {
        width: 120px;
        height: 120px;
        object-fit: cover;
        border-radius: 8px;
        background: #ede6df;
      }
      .card .placeholder {
        width: 120px;
        height: 120px;
        border-radius: 8px;
        background: repeating-linear-gradient(
          45deg,
          #ede6df,
          #ede6df 10px,
          #e2d7cd 10px,
          #e2d7cd 20px
        );
        display: grid;
        place-items: center;
        color: #6f6056;
        font-size: 12px;
      }
      .card h3 {
        margin: 0 0 8px;
      }
      .price {
        font-size: 18px;
        font-weight: bold;
        color: #b44a2a;
        margin: 4px 0;
      }
      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 12px;
        background: #ede6df;
        color: #4a3728;
        margin-right: 6px;
      }
      .badge.out {
        background: #f5c6c6;
        color: #7a1919;
      }
      .form-box {
        background: #fff;
        border-radius: 10px;
        padding: 20px;
        box-shadow: 0 8px 24px rgba(43, 33, 28, 0.08);
      }
      form p {
        margin-bottom: 14px;
      }
      input[type="text"],
      textarea {
        width: 100%;
        padding: 8px;
        border-radius: 6px;
        border: 1px solid #c8b9ae;
        font-family: inherit;
      }
      textarea {
        min-height: 160px;
      }
      @media (max-width: 640px) {
        .card {
          grid-template-columns: 1fr;
        }
        .card img {
          width: 100%;
          height: 200px;
        }
        .card .placeholder {
          width: 100%;
          height: 200px;
        }
        header .wrap {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="wrap">
        <a href="{% url 'post_list' %}">Sklep Django</a>
        <div class="actions">
          <a class="button secondary" href="{% url 'post_list' %}">Produkty</a>
          <a class="button secondary" href="{% url 'post_create' %}">Dodaj produkt</a>
          <a class="button" href="{% url 'cart_view' %}">&#128722; Koszyk ({{ request.session.cart|length|default:0 }})</a>
        </div>
      </div>
    </header>
    <main class="container">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
